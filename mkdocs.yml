site_name: GEOCOM Base de Datos Técnica

site_url: https://schweineorgel.github.io/geocom-kb/

extra_css:
  - stylesheets/extra.css

theme:
  name: material
  features:
    - navigation.top
    - search.suggest
    - search.highlight

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true

nav:
  - Inicio: index.md

  - Procedimientos:
      - DJI:
          - Phantom 4 RTK:
              - Formateo Micro SD Phantom 4 RTK: procedimientos/dji/phantom-4-rtk/phantom4rtk-microsd-format.md
      - Trimble:
          - Colectoras:
              - FTP para Windows Mobile: procedimientos/trimble/wmftp.md
